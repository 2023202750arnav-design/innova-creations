services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: innova_db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
  server:
    build: ./server
    env_file: .env.example
    restart: unless-stopped
    environment:
      PORT: 5002
      DATABASE_URL: postgresql://postgres:password@postgres:5432/innova_db
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "5002:5002"
  client:
    build: ./client
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5002/api/v1
    depends_on:
      - server
    ports:
      - "5173:5173"
volumes:
  postgres_data:
